    // UI logic
    let currentLang = 'en', currentCategory = 'all', searchQuery = '';
    function render() {
        let filtered = FULL_MENU.filter(i => currentCategory === 'all' || i.cat === currentCategory);
        if(searchQuery.trim()) {
            const q = searchQuery.toLowerCase();
            filtered = filtered.filter(i => i.en.name.toLowerCase().includes(q) || i.am.name.includes(q) || i.ar.name.includes(q));
        }
        const groups = {};
        filtered.forEach(i => { if(!groups[i.cat]) groups[i.cat] = []; groups[i.cat].push(i); });
        const catOrder = ["Pizzas & Pastas","Burgers & Sandwiches","Rice & Specials","Ethiopian Classics","Seafood & Meat","Salads & Breakfast","Drinks & Beverages","Combos & Catering","Extras & Takeaway"];
        let html = '';
        for(let cat of catOrder) {
            if(groups[cat]) {
                html += `<div class="category-section"><div class="category-title">${cat}</div><div class="menu-grid">`;
                groups[cat].forEach(item => {
                    const name = currentLang === 'en' ? item.en.name : (currentLang === 'am' ? item.am.name : item.ar.name);
                    const desc = currentLang === 'en' ? item.en.desc : (currentLang === 'am' ? item.am.desc : item.ar.desc);
                    html += `<div class="menu-card"><div class="item-header"><span class="item-name">${name}</span><span class="item-price">ETB ${item.price}</span></div><div class="item-desc"><span class="item-number">#${item.no}</span><span><i class="fas fa-tag badge-icon"></i> ${desc}</span></div></div>`;
                });
                html += `</div></div>`;
            }
        }
        document.getElementById('menuRoot').innerHTML = html || '<div class="no-results"><i class="fas fa-search"></i> No items found</div>';
    }
    function buildFilters() {
        const cats = [...new Set(FULL_MENU.map(i=>i.cat))];
        const container = document.getElementById('filterGroup');
        container.innerHTML = `<button data-cat="all" class="cat-btn active">${currentLang==='en'?'All':(currentLang==='am'?'ሁሉም':'الكل')}</button>`;
        cats.forEach(c=>{
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.setAttribute('data-cat',c);
            btn.innerText = c;
            btn.addEventListener('click',()=>{
                document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = c;
                render();
            });
            container.appendChild(btn);
        });
    }
    function setLanguage(lang) {
        currentLang = lang;
        document.body.className = `lang-${lang}`;
        document.querySelectorAll('.lang-btn').forEach(btn=>btn.classList.remove('active'));
        document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
        document.getElementById('heroTitle').innerHTML = lang==='en'?'✦ MONAZ ─ GASTRONOMY ✦':(lang==='am'?'✦ ሞናዝ ─ ጋስትሮኖሚ ✦':'✦ موناز ─ فن الطهي ✦');
        document.getElementById('heroSub').innerText = lang==='en'?'Authentic Ethiopian & International Cuisine | All prices include 15% VAT':(lang==='am'?'ትክክለኛ የኢትዮጵያ እና ዓለም አቀፍ ምግብ': 'مأكولات إثيوبية وعالمية أصلية');
        document.getElementById('globalSearch').placeholder = lang==='en'?'🔍 Search dish...':(lang==='am'?'🔍 ምግብ ፈልግ...':'🔍 ابحث عن طبق...');
        buildFilters();
        render();
    }
    document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click',()=>setLanguage(btn.getAttribute('data-lang'))));
    document.getElementById('globalSearch').addEventListener('input',e=>{searchQuery=e.target.value; render();});
    buildFilters();
    setLanguage('en');
</script>
